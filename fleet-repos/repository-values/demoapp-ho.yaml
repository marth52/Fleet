helmRepos:
  demoapp: # Helm Release Name -> {{ $name }}
    namespace: fleet-default
    # if repo is not an oci repository, chart parameter is required
    # chart: "some-chart"
    repo: "oci://suse-registry.marth52creative.xyz/custom-charts/demoapp-landingpage"
    version: "v1.0.0"
    workloadNamespace: demoapp
    #keepResources: true
    insecureSkipTLSVerify: false
    helmSecretName: "private-registry-login"
    downstreamResources:
      enabled: true
      resources:
        - kind: "Secret"
          name: "private-registry-imagepull"
        - kind: "ConfigMap"
          name: "demoapp-values"
    valuesFrom:
      - configMapKeyRef:
          name: demoapp-values
          namespace: demoapp
          key: values.yaml
    # if repo is not an oci repository, chart parameter is required
    #chart: "some-chart"
    targets:
    - clusterName: marth52-playground