gitRepos:
  local-path-provisioner:
    # enabled: true
    # enabled set to true in the values files is redundant
    # the default behaviour is always "deploy" meaning enabled is to true, unless explicitly set to false
    namespace: fleet-local
    branch: "main"
    helmSecretName: "appco-auth-creds"
    helmRepoURLRegex: "oci://dp.apps.rancher.io"
    paths:
    - /fleet-applications/local-path-provisioner
    targets:
    - clusterSelector: {}